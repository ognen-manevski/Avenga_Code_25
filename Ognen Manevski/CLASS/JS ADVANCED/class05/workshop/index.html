<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop Countrypedia</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./style.css" type="text/css">
</head>

<body>

    <nav class="navbar navbar-dark bg-primary border-bottom border-body mb-4 px-1">
        <div class="container">
            <span class="navbar-brand mb-0 fs-4 fw-bold">COUNTRY.PEDIA</span>
        </div>
    </nav>

    <main class="container px-4">

        <div class="row border border-body rounded-3 my-4">

            <div class="col-12 text-center mt-3">
                <h1 class="fs-1 fw-bold">COUNTRY.PEDIA</h1>
                <p>Search for countries and get information about them in real-time.</p>
            </div>

            <div class="col-12 my-4 mx-auto" style="max-width: 1000px;">
                <div class="input-group">
                    <input type="text" class="form-control rounded-3" placeholder="Search for a country..."
                        id="searchInput">
                    <button class="btn btn-primary ms-3 rounded-start-3" type="button" id="searchBtn">
                        <span class="material-symbols-outlined btn-ico fs-4">search</span>
                    </button>
                    <button class="btn btn-outline-secondary" type="button" id="resetBtn">Reset</button>
                </div>
            </div>
        </div>


        <div class="row border rounded-3 border-body pt-4">

            <div class="col-12 container d-grid gap-2 d-md-flex">
                <button class="btn btn-outline-secondary" id="allEU">All from Europe</button>
                <button class="btn btn-outline-secondary" id="allNeighbors">All neighbors of Macedonia</button>
                <button class="btn btn-outline-secondary" id="macedonia">Macedonia</button>
            </div>

            <div class="col-12 py-4">
                <hr class="dropdown-divider border border-bottom-1 border-top-0">
            </div>

            <div class="d-flex justify-content-center pb-4 d-none" id="spinner">
                <div class="spinner-border text-primary " role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>

            <div class="col-12 container">
                <div class="row" id="cardsContainer">
                    <!-- cards start  -->
                    <!-- cards end  -->
                </div>
            </div>
    </main>






    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./main.js"></script>
</body>

</html>
